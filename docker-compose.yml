version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - CHROMA_COLLECTION_NAME=${CHROMA_COLLECTION_NAME:-study_notes}
      - NOTES_DIR=/app/pdf
      - UPLOAD_DIR=/app/data/uploads
      - TOP_K=${TOP_K:-5}
      - RETRIEVAL_CANDIDATE_K=${RETRIEVAL_CANDIDATE_K:-20}
      - RETRIEVAL_MAX_DISTANCE=${RETRIEVAL_MAX_DISTANCE:-1.5}
      - CHUNK_SIZE_TOKENS=${CHUNK_SIZE_TOKENS:-220}
      - CHUNK_OVERLAP_TOKENS=${CHUNK_OVERLAP_TOKENS:-30}
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-15728640}
      - MAX_UPLOAD_FILES=${MAX_UPLOAD_FILES:-10}
      - LOG_PROMPTS=${LOG_PROMPTS:-true}
      - KEEP_ALIVE_ENABLED=${KEEP_ALIVE_ENABLED:-false}
      - KEEP_ALIVE_URL=${KEEP_ALIVE_URL:-}
    volumes:
      - chroma_data:/app/data/chroma_db
      - uploads:/app/data/uploads
      - ./pdf:/app/pdf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  chroma_data:
  uploads: